<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>67 Counter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: white;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

.app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.screen.active {
  opacity: 1;
  pointer-events: auto;
}

/* START SCREEN */
#start-screen {
  background: radial-gradient(ellipse at center, #3C3489 0%, #0a0a1a 70%);
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 20px;
}

.logo {
  font-size: clamp(80px, 25vw, 180px);
  font-weight: 900;
  letter-spacing: -8px;
  line-height: 0.9;
  text-shadow: 0 0 60px rgba(175, 169, 236, 0.5);
  margin-bottom: 20px;
  animation: glow 2s ease-in-out infinite;
}

.logo .six { color: #AFA9EC; }
.logo .seven { color: #FAC775; }

@keyframes glow {
  0%, 100% { text-shadow: 0 0 60px rgba(175, 169, 236, 0.5); }
  50% { text-shadow: 0 0 80px rgba(250, 199, 117, 0.7); }
}

.tagline {
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 12px;
  font-weight: 500;
}

.subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 50px;
  max-width: 320px;
}

.btn-primary {
  background: linear-gradient(135deg, #FAC775 0%, #F0997B 100%);
  color: #26215C;
  padding: 20px 60px;
  border-radius: 40px;
  font-size: 20px;
  font-weight: 800;
  border: none;
  cursor: pointer;
  box-shadow: 0 10px 40px rgba(250, 199, 117, 0.4);
  letter-spacing: 1px;
  transition: transform 0.1s, box-shadow 0.2s;
}

.btn-primary:active {
  transform: scale(0.96);
  box-shadow: 0 4px 20px rgba(250, 199, 117, 0.3);
}

.loading-status {
  margin-top: 30px;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  min-height: 18px;
}

.how-to {
  margin-top: 40px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
}

.how-to-row {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.step-num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(175, 169, 236, 0.2);
  color: #AFA9EC;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
}

/* GAME SCREEN */
#game-screen {
  background: #000;
}

#video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}

#canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: scaleX(-1);
  pointer-events: none;
}

.game-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 20px;
  pointer-events: none;
  z-index: 10;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.timer {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 20px;
  font-weight: 800;
  color: #FAC775;
  border: 2px solid rgba(250, 199, 117, 0.4);
  pointer-events: auto;
}

.timer.warning {
  color: #F0997B;
  border-color: rgba(240, 153, 123, 0.6);
  animation: pulse-warn 0.5s ease-in-out infinite;
}

@keyframes pulse-warn {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.close-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  color: white;
  border: none;
  font-size: 22px;
  cursor: pointer;
  pointer-events: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 300;
}

.center-display {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}

.count-display {
  font-size: clamp(120px, 40vw, 260px);
  font-weight: 900;
  letter-spacing: -10px;
  line-height: 1;
  text-shadow: 0 0 80px rgba(175, 169, 236, 0.8), 0 0 160px rgba(250, 199, 117, 0.4);
  transition: transform 0.15s;
}

.count-display.pulse {
  animation: count-pulse 0.3s ease-out;
}

@keyframes count-pulse {
  0% { transform: scale(1); color: white; }
  40% { transform: scale(1.3); color: #FAC775; text-shadow: 0 0 120px #FAC775; }
  100% { transform: scale(1); color: white; }
}

.count-label {
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 10px;
}

.bottom-prompt {
  text-align: center;
  padding-bottom: 20px;
}

.prompt-box {
  background: rgba(175, 169, 236, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(175, 169, 236, 0.4);
  border-radius: 20px;
  padding: 16px 24px;
  display: inline-block;
  font-size: 15px;
  font-weight: 600;
  color: #AFA9EC;
}

.hand-status {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  transition: all 0.3s;
  border: 1px solid rgba(255,255,255,0.2);
  white-space: nowrap;
}

.hand-status.detected {
  background: rgba(29, 158, 117, 0.3);
  border-color: rgba(93, 202, 165, 0.6);
  color: #5DCAA5;
}

.hand-status.not-detected {
  color: rgba(255,255,255,0.5);
}

/* Motion indicator bar on the left side */
.motion-bar {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 6px;
  height: 40%;
  border-radius: 3px;
  background: rgba(255,255,255,0.1);
  overflow: visible;
  z-index: 20;
}

.motion-bar-fill {
  position: absolute;
  left: -2px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #FAC775;
  box-shadow: 0 0 12px #FAC775;
  transition: top 0.08s linear;
}

.motion-bar-zone {
  position: absolute;
  left: -4px;
  width: 14px;
  height: 2px;
  background: rgba(175, 169, 236, 0.6);
  border-radius: 1px;
}

/* RESULTS SCREEN */
#results-screen {
  background: linear-gradient(180deg, #1a1a2e 0%, #0a0a1a 100%);
  justify-content: center;
  align-items: center;
  padding: 40px 30px;
}

.results-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px;
  padding: 40px 30px;
  text-align: center;
  width: 100%;
  max-width: 360px;
}

.results-label {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.final-count {
  font-size: clamp(80px, 20vw, 120px);
  font-weight: 900;
  color: #FAC775;
  letter-spacing: -4px;
  line-height: 1;
  margin-bottom: 10px;
  text-shadow: 0 0 60px rgba(250, 199, 117, 0.5);
}

.final-count-label {
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 30px;
  font-weight: 600;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 15px;
}

.stat-row:last-of-type {
  border-bottom: none;
}

.stat-label {
  color: rgba(255,255,255,0.6);
}

.stat-value {
  color: white;
  font-weight: 700;
}

.best-badge {
  display: inline-block;
  background: linear-gradient(135deg, #FAC775, #F0997B);
  color: #26215C;
  padding: 6px 14px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 1px;
  margin-top: 15px;
  text-transform: uppercase;
}

.results-buttons {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 360px;
}

.btn-secondary {
  background: rgba(175, 169, 236, 0.2);
  color: #AFA9EC;
  padding: 16px;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 700;
  border: 1px solid rgba(175, 169, 236, 0.3);
  cursor: pointer;
  transition: transform 0.1s;
}

.btn-secondary:active {
  transform: scale(0.97);
}

.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: #AFA9EC;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

.particle {
  position: absolute;
  pointer-events: none;
  font-weight: 900;
  font-size: 40px;
  animation: float-up 1s ease-out forwards;
  z-index: 5;
}

@keyframes float-up {
  0% { opacity: 1; transform: translateY(0) scale(0.5); }
  100% { opacity: 0; transform: translateY(-200px) scale(1.5); }
}

/* Flash overlay on count */
.count-flash {
  position: absolute;
  inset: 0;
  background: rgba(250, 199, 117, 0.08);
  pointer-events: none;
  z-index: 4;
  opacity: 0;
  transition: opacity 0.15s;
}

.count-flash.active {
  opacity: 1;
}

</style>
</head>
<body>

<div class="app">

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <div class="logo">
      <span class="six">6</span><span class="seven">7</span>
    </div>
    <div class="tagline">67 COUNTER</div>
    <div class="subtitle">do the 6-7 gesture — see how many you can do in 30 seconds</div>
    <button class="btn-primary" id="start-btn" onclick="startGame()">START</button>
    <div class="loading-status" id="status"></div>
    <div class="how-to">
      <div class="how-to-row">
        <div class="step-num">1</div>
        <span>allow camera access</span>
      </div>
      <div class="how-to-row">
        <div class="step-num">2</div>
        <span>show your hands to the camera</span>
      </div>
      <div class="how-to-row">
        <div class="step-num">3</div>
        <span>move hands up and down</span>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="count-flash" id="count-flash"></div>
    <div class="game-overlay">
      <div class="top-bar">
        <div class="timer" id="timer">0:30</div>
        <button class="close-btn" onclick="endGame()">×</button>
      </div>
      <div class="hand-status not-detected" id="hand-status">looking for hands...</div>
      <div class="center-display">
        <div class="count-display" id="count">0</div>
        <div class="count-label">6 · 7</div>
      </div>
      <div class="bottom-prompt">
        <div class="prompt-box" id="prompt">show hands & move up/down</div>
      </div>
    </div>
    <!-- Motion indicator -->
    <div class="motion-bar" id="motion-bar">
      <div class="motion-bar-zone" id="bar-baseline" style="top:50%"></div>
      <div class="motion-bar-fill" id="bar-dot" style="top:50%"></div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="screen">
    <div class="results-card">
      <div class="results-label">YOUR SCORE</div>
      <div class="final-count" id="final-count">0</div>
      <div class="final-count-label">6-7s in 30 seconds</div>
      <div class="stat-row">
        <span class="stat-label">per second</span>
        <span class="stat-value" id="per-sec">0.0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">personal best</span>
        <span class="stat-value" id="best">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">rank</span>
        <span class="stat-value" id="rank">rookie</span>
      </div>
      <div id="new-best" style="display:none;" class="best-badge">NEW BEST</div>
    </div>
    <div class="results-buttons">
      <button class="btn-primary" onclick="startGame()">PLAY AGAIN</button>
      <button class="btn-secondary" onclick="showScreen('start-screen')">BACK HOME</button>
    </div>
  </div>

</div>

<script type="module">
import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

let handLandmarker = null;
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');

let gameState = {
  active: false,
  count: 0,
  timeLeft: 30,
  startTime: 0,
  timer: null,
  stream: null,
};

// ─── NEW MOTION TRACKING ENGINE ───
// Uses a ring buffer + zone-based state machine instead of frame deltas
const BUFFER_SIZE = 6;
const REVERSAL_THRESHOLD = 0.02; // 2% of screen = ~10px on 480p — very sensitive
const MIN_CYCLE_MS = 100;

let motion = {
  yBuffer: [],
  state: 'idle',    // idle | went_up | went_down
  baselineY: null,
  peakY: null,       // best Y while going up (lowest value)
  valleyY: null,     // best Y while going down (highest value)
  lastCountTime: 0,
  smoothY: 0,
  frameCount: 0,
  handsLostFrames: 0,
};

function resetMotion() {
  motion = {
    yBuffer: [],
    state: 'idle',
    baselineY: null,
    peakY: null,
    valleyY: null,
    lastCountTime: 0,
    smoothY: 0,
    frameCount: 0,
    handsLostFrames: 0,
  };
}

function getBufferAvg() {
  if (motion.yBuffer.length === 0) return null;
  return motion.yBuffer.reduce((a, b) => a + b) / motion.yBuffer.length;
}

function trackMotion(rawY) {
  // Ring buffer for smoothing
  motion.yBuffer.push(rawY);
  if (motion.yBuffer.length > BUFFER_SIZE) motion.yBuffer.shift();
  if (motion.yBuffer.length < 2) return;

  const y = getBufferAvg();
  motion.smoothY = y;
  motion.frameCount++;

  // Initialize baseline from first few frames
  if (motion.baselineY === null) {
    motion.baselineY = y;
    motion.peakY = y;
    motion.valleyY = y;
    return;
  }

  // Slowly adapt baseline toward current position
  motion.baselineY = motion.baselineY * 0.997 + y * 0.003;

  const now = performance.now();
  const elapsed = now - motion.lastCountTime;

  // In normalized coords: Y decreases = hands go UP, Y increases = hands go DOWN
  switch (motion.state) {
    case 'idle':
      // Wait for any significant movement from baseline
      if (y < motion.baselineY - REVERSAL_THRESHOLD) {
        motion.state = 'went_up';
        motion.peakY = y;
      } else if (y > motion.baselineY + REVERSAL_THRESHOLD) {
        motion.state = 'went_down';
        motion.valleyY = y;
      }
      break;

    case 'went_up':
      // Track the peak (minimum Y = highest position)
      if (y < motion.peakY) motion.peakY = y;
      // Did we reverse downward enough from the peak?
      if (y > motion.peakY + REVERSAL_THRESHOLD) {
        motion.state = 'went_down';
        motion.valleyY = y;
      }
      break;

    case 'went_down':
      // Track the valley (maximum Y = lowest position)
      if (y > motion.valleyY) motion.valleyY = y;
      // Did we reverse upward enough from the valley?
      // Full cycle complete (up then down) — count!
      if (y < motion.valleyY - REVERSAL_THRESHOLD && elapsed >= MIN_CYCLE_MS) {
        countUp();
        motion.lastCountTime = now;
        motion.state = 'went_up';
        motion.peakY = y;
      }
      break;
  }

  // Update motion bar UI
  updateMotionBar(y);
}

function updateMotionBar(y) {
  const dot = document.getElementById('bar-dot');
  const baseline = document.getElementById('bar-baseline');
  if (!dot || !baseline) return;

  // Map Y (0..1) to bar position (0%..100%)
  // Clamp to reasonable range around the baseline
  const range = 0.3;
  const base = motion.baselineY || 0.5;
  const normalized = ((y - base) / range + 0.5);
  const pct = Math.max(0, Math.min(1, normalized)) * 100;
  dot.style.top = pct + '%';

  // Color the dot based on state
  if (motion.state === 'went_up') {
    dot.style.background = '#5DCAA5';
    dot.style.boxShadow = '0 0 12px #5DCAA5';
  } else if (motion.state === 'went_down') {
    dot.style.background = '#F0997B';
    dot.style.boxShadow = '0 0 12px #F0997B';
  } else {
    dot.style.background = '#FAC775';
    dot.style.boxShadow = '0 0 12px #FAC775';
  }

  baseline.style.top = '50%';
}

// ─── MODEL LOADING ───
async function loadModel() {
  const status = document.getElementById('status');
  status.innerHTML = '<span class="spinner"></span>loading ai model...';
  try {
    const vision = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    // Try GPU first, fallback to CPU for mobile compatibility
    for (const delegate of ['GPU', 'CPU']) {
      try {
        handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
            delegate
          },
          runningMode: 'VIDEO',
          numHands: 2,
          minHandDetectionConfidence: 0.5,
          minHandPresenceConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        console.log('Hand model loaded with:', delegate);
        break;
      } catch (e) {
        console.warn(delegate + ' failed:', e.message);
        if (delegate === 'CPU') throw e;
      }
    }
    status.innerHTML = 'ready to play';
    setTimeout(() => { status.textContent = ''; }, 2000);
  } catch (err) {
    status.textContent = 'model failed to load. try refreshing.';
    console.error('Model load error:', err);
  }
}

// ─── CAMERA ───
async function startCamera() {
  try {
    // Try multiple constraint sets for maximum mobile compatibility
    const constraintOptions = [
      { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } },
      { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
      { facingMode: 'user' },
      true, // absolute fallback
    ];

    let stream = null;
    for (const constraints of constraintOptions) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: constraints,
          audio: false
        });
        break;
      } catch (e) {
        console.warn('Camera constraint failed:', constraints, e.message);
      }
    }

    if (!stream) throw new Error('Could not access camera');

    video.srcObject = stream;
    gameState.stream = stream;

    return new Promise((resolve, reject) => {
      video.onloadedmetadata = () => {
        video.play().then(() => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          console.log('Camera ready:', video.videoWidth, 'x', video.videoHeight);
          resolve();
        }).catch(reject);
      };
      video.onerror = reject;
      // Timeout fallback for mobile
      setTimeout(() => {
        if (video.readyState >= 2) {
          canvas.width = video.videoWidth || 320;
          canvas.height = video.videoHeight || 240;
          resolve();
        }
      }, 3000);
    });
  } catch (err) {
    alert('Camera permission is required to play. Please allow camera access and try again.');
    throw err;
  }
}

function stopCamera() {
  if (gameState.stream) {
    gameState.stream.getTracks().forEach(t => t.stop());
    gameState.stream = null;
  }
  video.srcObject = null;
}

// ─── GAME FLOW ───
let lastDetectTime = -1;

window.startGame = async function() {
  if (!handLandmarker) {
    await loadModel();
    if (!handLandmarker) return;
  }

  showScreen('game-screen');
  await startCamera();

  gameState.active = true;
  gameState.count = 0;
  gameState.timeLeft = 30;
  gameState.startTime = Date.now();
  lastDetectTime = -1;
  resetMotion();

  document.getElementById('count').textContent = '0';
  document.getElementById('timer').textContent = '0:30';
  document.getElementById('timer').classList.remove('warning');
  document.getElementById('prompt').textContent = 'show hands & move up/down';

  gameState.timer = setInterval(() => {
    gameState.timeLeft--;
    const t = document.getElementById('timer');
    t.textContent = `0:${String(gameState.timeLeft).padStart(2, '0')}`;
    if (gameState.timeLeft <= 5) t.classList.add('warning');
    if (gameState.timeLeft <= 0) endGame();
  }, 1000);

  requestAnimationFrame(detectLoop);
}

window.endGame = function() {
  if (!gameState.active) return;
  gameState.active = false;
  clearInterval(gameState.timer);
  stopCamera();

  const count = gameState.count;
  const bestKey = 'sixseven_best';
  const prevBest = parseInt(localStorage.getItem(bestKey) || '0');
  const isNewBest = count > prevBest;
  if (isNewBest) localStorage.setItem(bestKey, count);

  document.getElementById('final-count').textContent = count;
  document.getElementById('per-sec').textContent = (count / 30).toFixed(1);
  document.getElementById('best').textContent = isNewBest ? count : prevBest;
  document.getElementById('new-best').style.display = isNewBest ? 'inline-block' : 'none';

  let rank = 'rookie';
  if (count >= 50) rank = 'legend';
  else if (count >= 35) rank = 'pro';
  else if (count >= 20) rank = 'solid';
  else if (count >= 10) rank = 'warming up';
  document.getElementById('rank').textContent = rank;

  showScreen('results-screen');
}

window.showScreen = function(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── DETECTION LOOP ───
function detectLoop() {
  if (!gameState.active) return;

  if (video.readyState >= 2 && handLandmarker) {
    const now = performance.now();
    if (now > lastDetectTime + 1) { // At least 1ms gap
      lastDetectTime = now;
      try {
        const results = handLandmarker.detectForVideo(video, Math.round(now));
        processResults(results);
      } catch (e) {
        // Silently skip bad frames
      }
    }
  }

  requestAnimationFrame(detectLoop);
}

function processResults(results) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const statusEl = document.getElementById('hand-status');
  const promptEl = document.getElementById('prompt');

  const hasHands = results.landmarks && results.landmarks.length > 0;

  if (!hasHands) {
    motion.handsLostFrames++;
    if (motion.handsLostFrames > 15) {
      statusEl.textContent = 'looking for hands...';
      statusEl.className = 'hand-status not-detected';
      promptEl.textContent = 'show your hands to the camera';
      // Don't reset motion buffer immediately — hands might reappear
      if (motion.handsLostFrames > 45) {
        resetMotion();
      }
    }
    return;
  }

  motion.handsLostFrames = 0;
  const numHands = results.landmarks.length;
  statusEl.textContent = numHands + (numHands > 1 ? ' hands' : ' hand') + ' detected';
  statusEl.className = 'hand-status detected';

  if (motion.frameCount > 5) {
    promptEl.textContent = 'move hands up and down';
  }

  drawHands(results.landmarks);

  // Compute average Y from wrist (0) landmarks — most stable point
  let avgY = 0;
  for (const hand of results.landmarks) {
    avgY += hand[0].y; // wrist Y
  }
  avgY /= numHands;

  trackMotion(avgY);
}

// ─── DRAWING ───
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

function drawHands(landmarks) {
  const w = canvas.width;
  const h = canvas.height;

  for (const hand of landmarks) {
    // Draw connections
    ctx.strokeStyle = 'rgba(250, 199, 117, 0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (const [a, b] of HAND_CONNECTIONS) {
      ctx.moveTo(hand[a].x * w, hand[a].y * h);
      ctx.lineTo(hand[b].x * w, hand[b].y * h);
    }
    ctx.stroke();

    // Draw wrist landmark bigger (it's what we track)
    ctx.fillStyle = '#FAC775';
    ctx.beginPath();
    ctx.arc(hand[0].x * w, hand[0].y * h, 8, 0, Math.PI * 2);
    ctx.fill();

    // Draw other landmarks smaller
    ctx.fillStyle = 'rgba(175, 169, 236, 0.7)';
    for (let i = 1; i < hand.length; i++) {
      ctx.beginPath();
      ctx.arc(hand[i].x * w, hand[i].y * h, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ─── COUNT ───
function countUp() {
  gameState.count++;
  const countEl = document.getElementById('count');
  countEl.textContent = gameState.count;
  countEl.classList.remove('pulse');
  void countEl.offsetWidth;
  countEl.classList.add('pulse');

  // Flash effect
  const flash = document.getElementById('count-flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);

  spawnParticle();
}

function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = Math.random() > 0.5 ? '6' : '7';
  p.style.color = Math.random() > 0.5 ? '#FAC775' : '#AFA9EC';
  p.style.left = (30 + Math.random() * 40) + '%';
  p.style.top = '50%';
  document.querySelector('#game-screen').appendChild(p);
  setTimeout(() => p.remove(), 1000);
}

// ─── INIT ───
window.addEventListener('load', () => {
  loadModel();
});

</script>
